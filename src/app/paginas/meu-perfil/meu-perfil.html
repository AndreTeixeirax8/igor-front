<!-- Tela "Meu perfil" (exibida dentro do layout do painel). -->

<div class="perfil__cabecalho">
  <h1 class="perfil__titulo">Meu perfil</h1>
  <p class="perfil__subtitulo">Edite seus dados de cadastro e sua foto.</p>
</div>

<app-mensagem tipo="sucesso" [texto]="mensagemSucesso()" />
<app-mensagem tipo="erro" [texto]="mensagemErro()" />

<div class="perfil__cartao">
  <!-- Foto de perfil: atual ou prévia da nova, com validação (componente). -->
  <div class="perfil__foto">
    <app-seletor-foto
      [urlAtual]="usuario()?.url_avatar ?? null"
      [nome]="usuario()?.nome ?? ''"
      [tamanho]="120"
      (mudou)="fotoSelecionada.set($event)"
    />
  </div>

  <!-- Dados do perfil -->
  <form class="perfil__formulario" (ngSubmit)="salvar()">
    <div class="campo">
      <label class="campo__rotulo" for="nome">Nome completo</label>
      <input
        id="nome"
        class="campo__entrada"
        type="text"
        name="nome"
        [ngModel]="nome()"
        (ngModelChange)="nome.set($event)"
      />
    </div>

    <div class="campo">
      <label class="campo__rotulo" for="email">E-mail</label>
      <!-- O e-mail é usado para login e não é editável por aqui. -->
      <input
        id="email"
        class="campo__entrada"
        type="email"
        name="email"
        [value]="usuario()?.email"
        disabled
      />
    </div>

    <div class="campo">
      <label class="campo__rotulo" for="telefone">Telefone</label>
      <input
        id="telefone"
        class="campo__entrada"
        type="tel"
        name="telefone"
        placeholder="(00) 00000-0000"
        [ngModel]="telefone()"
        (ngModelChange)="telefone.set($event)"
      />
    </div>

    <div class="campo">
      <label class="campo__rotulo">Perfil</label>
      @if (usuario(); as u) {
        <app-selo [tipo]="u.perfil">{{ rotuloPerfil() }}</app-selo>
      }
    </div>

    <button class="botao botao--principal perfil__salvar" type="submit" [disabled]="salvando()">
      {{ salvando() ? 'Salvando...' : 'Salvar alterações' }}
    </button>
  </form>
</div>

<!-- Aparência: escolha do tema (escuro/claro). Aplicado na hora e lembrado. -->
<div class="perfil__aparencia">
  <div>
    <h2 class="perfil__aparencia-titulo">Aparência</h2>
    <p class="perfil__aparencia-descricao">Escolha o tema da interface.</p>
  </div>

  <div class="seletor-tema" role="group" aria-label="Tema da interface">
    <button
      class="seletor-tema__opcao"
      type="button"
      [class.seletor-tema__opcao--ativa]="tema() === 'escuro'"
      (click)="escolherTema('escuro')"
    >
      🌙 Escuro
    </button>
    <button
      class="seletor-tema__opcao"
      type="button"
      [class.seletor-tema__opcao--ativa]="tema() === 'claro'"
      (click)="escolherTema('claro')"
    >
      ☀️ Claro
    </button>
  </div>
</div>
