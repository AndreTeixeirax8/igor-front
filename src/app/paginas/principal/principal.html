<!-- Conteúdo da página principal (o layout externo cuida da barra lateral). -->

<!-- Cabeçalho da página -->
<div class="principal__cabecalho">
  <p class="principal__saudacao">Olá, {{ primeiroNome() }} 👋</p>
  <h1 class="principal__titulo">Painel da barbearia</h1>
</div>

<!-- Cartões de resumo -->
<section class="principal__cartoes">
  @for (cartao of cartoesResumo; track cartao.titulo) {
    <article class="cartao-resumo">
      <p class="cartao-resumo__titulo">{{ cartao.titulo }}</p>
      <p class="cartao-resumo__valor">{{ cartao.valor }}</p>
      <p class="cartao-resumo__detalhe">{{ cartao.detalhe }}</p>
    </article>
  }
</section>

<!-- Próximos agendamentos (espaço reservado) -->
<section class="principal__bloco">
  <div class="principal__bloco-cabecalho">
    <h2 class="principal__bloco-titulo">Próximos agendamentos</h2>
    <button class="botao botao--contorno" type="button" disabled>Em breve</button>
  </div>

  <div class="principal__vazio">
    <span class="principal__vazio-icone">✂</span>
    <p class="principal__vazio-texto">
      A lista de agendamentos aparecerá aqui assim que o módulo for conectado ao
      back-end.
    </p>
  </div>
</section>
