<!-- Conteúdo da página principal (o layout externo cuida da barra lateral). -->

<!-- Cabeçalho da página -->
<div class="principal__cabecalho">
  <p class="principal__saudacao">Olá, {{ primeiroNome() }} 👋</p>
  <h1 class="principal__titulo">Painel</h1>
</div>

<!-- Cartões de resumo (dados reais) -->
<section class="principal__cartoes">
  @for (cartao of cartoes(); track cartao.titulo) {
    <article class="cartao-resumo">
      <p class="cartao-resumo__titulo">{{ cartao.titulo }}</p>
      <p class="cartao-resumo__valor">{{ cartao.valor }}</p>
      <p class="cartao-resumo__detalhe">{{ cartao.detalhe }}</p>
    </article>
  }
</section>

<!-- Ações rápidas -->
<section class="principal__bloco">
  <h2 class="principal__bloco-titulo">Ações rápidas</h2>

  <div class="principal__acoes">
    <a class="botao botao--principal" routerLink="/agendar">Agendar horário</a>
    <a class="botao botao--contorno" routerLink="/meus-agendamentos">
      Meus agendamentos
    </a>
    @if (ehGestor()) {
      <a class="botao botao--contorno" routerLink="/agenda">Ver a agenda</a>
    }
  </div>
</section>
